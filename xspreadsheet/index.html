<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>x-data-spreadsheet - 100x100</title>
  <link rel="stylesheet" href="node_modules/x-data-spreadsheet/dist/xspreadsheet.css">
  <style>
    body { margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="x-spreadsheet-demo"></div>

  <script src="node_modules/x-data-spreadsheet/dist/xspreadsheet.js"></script>
  <script>
    // Gerar dados: 100 linhas x 100 colunas
    const rows = {};
    for (let r = 0; r < 100; r++) {
      const cells = {};
      for (let c = 0; c < 100; c++) {
        cells[c] = { text: `R${r + 1}C${c + 1}` };
      }
      rows[r] = { cells };
    }
    rows.len = 100;

    const data = {
      name: "Sheet1",
      rows,
      cols: { len: 100 },
    };

    const s = new x_spreadsheet("#x-spreadsheet-demo", {
      mode: "edit",
      showToolbar: true,
      showGrid: true,
      showContextmenu: true,
      view: {
        height: () => document.documentElement.clientHeight,
        width: () => document.documentElement.clientWidth,
      },
      row: {
        len: 100,
        height: 25,
      },
      col: {
        len: 100,
        width: 100,
        indexWidth: 60,
        minWidth: 60,
      },
    }).loadData(data);
  </script>
</body>
</html>
